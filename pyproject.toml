[tool.ruff]
# Match Ruff's target version to the minimum supported Python version in CI (3.9–3.13)
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG001", # unused arguments in functions
]
ignore = [
    "E501", # line too long, handled by black
    "B008", # do not perform function calls in argument defaults
    "W191", # indentation contains tabs
    "B904", # Allow raising exceptions without from e, for HTTPException
]

# pyright configuration (as specified in README.md)
[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
exclude = [".venv/", "**/__pycache__"]
reportMissingTypeStubs = false
reportImportCycles = false

# commitizen configuration to match PR checks
[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
version_files = ["pyproject.toml:version"]

[tool.commitizen.customize]
message_template = "{{change_type}}{{scope}}: {{message}}"
example = "feat: add new feature"
schema = "<type>(<scope>): <subject>"
schema_pattern = "(fix|feat|docs|style|refactor|test|chore|ci|build)(\\\\(\\\\S+\\\\))?!?: .+"
change_type_order = ["BREAKING CHANGE", "feat", "fix", "refactor", "perf"]
commit_parser = "^(?P<change_type>fix|feat|docs|style|refactor|test|chore|ci|build)(?:\\\\((?P<scope>[^()\\\\r\\\\n]*)\\\\))?(?P<breaking>!)?:\\\\s(?P<message>.*)?"
changelog_pattern = "^(fix|feat|docs|style|refactor|test|chore|ci|build)(\\\\(.+\\\\))?(!)?:\\\\s(.+)"

[tool.commitizen.customize.change_type_map]
"fix" = "Fix"
"refactor" = "Refactor"
"perf" = "Perf"
"breaking" = "BREAKING CHANGE"
"feat" = "Feat"
[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
message = "Select the type of change you are committing"
choices = [
    { value = "fix", name = "fix: A bug fix" },
    { value = "feat", name = "feat: A new feature" },
    { value = "docs", name = "docs: Documentation only changes" },
    { value = "style", name = "style: Changes that do not affect the meaning of the code" },
    { value = "refactor", name = "refactor: A code change that neither fixes a bug nor adds a feature" },
    { value = "test", name = "test: Adding missing tests or correcting existing tests" },
    { value = "chore", name = "chore: Changes to the build process or auxiliary tools" },
    { value = "ci", name = "ci: Changes to our CI configuration files and scripts" },
    { value = "build", name = "build: Changes that affect the build system or external dependencies" },
    { value = "deploy", name = "deploy: Changes related to deployment" },
]

[[tool.commitizen.customize.questions]]
type = "input"
name = "scope"
message = "What is the scope of this change? (class or file name): (press [enter] to skip)"

[[tool.commitizen.customize.questions]]
type = "input"
name = "message"
message = "Write a short and imperative summary of the code changes: (lower case and no period)"
