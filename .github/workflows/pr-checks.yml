name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

jobs:
  pr-title-check:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure the action to check the PR title
          types: |
            fix
            feat
            docs
            style
            refactor
            test
            chore
            ci
            build
            deploy
          requireScope: false
          disallowScopes: ""
          subjectPattern: "^.{1,50}$"
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character and is not longer than 50 characters.
          wip: false
          validateSingleCommit: false

  pr-size-check:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Get the number of changed files and lines
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          CHANGED_LINES=$(git diff --stat origin/main...HEAD | tail -1 | grep -o '[0-9]\+ insertions\|[0-9]\+ deletions' | awk '{sum += $1} END {print sum}')

          echo "Changed files: $CHANGED_FILES"
          echo "Changed lines: $CHANGED_LINES"

          # Fail if PR is too large (adjust thresholds as needed)
          if [ "$CHANGED_FILES" -gt 20 ]; then
            echo "❌ PR contains too many files ($CHANGED_FILES). Consider breaking it down."
            exit 1
          fi

          if [ "$CHANGED_LINES" -gt 500 ]; then
            echo "❌ PR contains too many line changes ($CHANGED_LINES). Consider breaking it down."
            exit 1
          fi

          echo "✅ PR size is acceptable"

  conflict-check:
    name: Check for Merge Conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if ! git merge-tree $(git merge-base HEAD origin/main) HEAD origin/main | grep -q "<<<<<<< "; then
            echo "✅ No merge conflicts detected"
          else
            echo "❌ Merge conflicts detected. Please resolve conflicts."
            exit 1
          fi

  label-check:
    name: Check Required Labels
    runs-on: ubuntu-latest
    continue-on-error: true # Make this check non-blocking during setup
    steps:
      - name: Check for required labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const labelNames = labels.map(label => label.name);
            const requiredLabels = ['type', 'priority', 'status'];

            const missingLabels = [];
            for (const requiredLabel of requiredLabels) {
              if (!labelNames.includes(requiredLabel)) {
                missingLabels.push(requiredLabel);
              }
            }

            if (missingLabels.length > 0) {
              console.log(`⚠️ Missing recommended labels: ${missingLabels.join(', ')}`);
              console.log('Consider adding these custom labels to improve PR organization.');
            } else {
              console.log('✅ All recommended labels are present');
            }

  branch-freshness:
    name: Check Branch Freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if branch is up to date
        run: |
          git fetch origin main
          BEHIND_COUNT=$(git rev-list --count HEAD..origin/main)

          if [ "$BEHIND_COUNT" -gt 0 ]; then
            echo "⚠️  Branch is $BEHIND_COUNT commits behind main. Consider rebasing."
            echo "BRANCH_OUT_OF_DATE=true" >> $GITHUB_ENV
          else
            echo "✅ Branch is up to date with main"
            echo "BRANCH_OUT_OF_DATE=false" >> $GITHUB_ENV
          fi

      - name: Comment on PR if out of date
        if: env.BRANCH_OUT_OF_DATE == 'true'

        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Branch Out of Date**\n\nThis branch is behind the main branch. Please consider rebasing to ensure compatibility:\n\n```bash\ngit fetch origin main\ngit rebase origin/main\n```'
            });
