name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    outputs:
      continue: ${{ steps.continue.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub
          python -m pip install pre-commit

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Set continue flag
        id: continue
        run: echo "result=true" >> $GITHUB_OUTPUT

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    if: needs.pre-commit.outputs.continue == 'true'
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest test_app.py -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-commit
    if: needs.pre-commit.outputs.continue == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit[toml]

      - name: Run safety check
        run: safety check --json

      - name: Run bandit security scan
        run: bandit -f screen app.py || true

  build-and-validate:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs: [pre-commit, test]
    if: needs.pre-commit.outputs.continue == 'true' && needs.test.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test application startup
        run: |
          python -c "from app import app; print('App imported successfully')"
          timeout 10s python app.py || true

      - name: Validate application health
        run: |
          FLASK_HOST=0.0.0.0 python app.py &
          APP_PID=$!
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          kill $APP_PID

  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [pre-commit, test, security-scan, build-and-validate]
    if: always() && needs.pre-commit.outputs.continue == 'true' && needs.test.result == 'success' && needs.security-scan.result == 'success' && needs.build-and-validate.result == 'success'

    steps:
      - name: Deployment status
        run: |
          echo "🚀 All checks passed! Ready for deployment."
          echo "✅ Pre-commit checks: PASSED"
          echo "✅ Tests: PASSED"
          echo "✅ Security scan: PASSED"
          echo "✅ Build validation: PASSED"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan] # More aligned with README but still includes security
    if: needs.test.result == 'success' && needs.security-scan.result == 'success' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REPO_NAME: ${{ github.event.repository.name }}
          CONTAINER_NAME: techflow-app
          EC2_USER: ${{ secrets.EC2_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          envs: DOCKERHUB_USERNAME,REPO_NAME,CONTAINER_NAME,EC2_USER
          script: |
            cd /home/$EC2_USER

            # Update scripts from repository
            echo "📥 Updating deployment scripts..."
            if [ -d "techflow_project" ]; then
              cd techflow_project
              git pull origin main
              cd ..
            else
              git clone https://github.com/JonesKwameOsei/techflow_project.git
            fi

            # Copy latest scripts and make executable
            cp techflow_project/scripts/*.sh /home/$EC2_USER/
            chmod +x *.sh
            echo "✅ Scripts updated successfully"

            echo "🚀 Starting deployment of TechFlow app..."
            echo "📦 Repository: $REPO_NAME"
            echo "🐳 Docker image: ${DOCKERHUB_USERNAME}/${REPO_NAME}"
            if ./deploy.sh; then
              echo "✅ Deployment successful!"
              exit 0
            else
              echo "❌ Deployment failed!"
              exit 1
            fi

      - name: Send success notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "✅ TechFlow Deployment Successful - ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>🎉 Deployment Successful!</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <p><strong>Message:</strong> ${{ github.event.head_commit.message }}</p>
            <p><strong>Deployment URL:</strong> http://${{ secrets.EC2_HOST }}</p>
            <p><strong>Timeline:</strong> ${{ github.event.head_commit.timestamp }}</p>
            <hr>
            <p>Your TechFlow application is now live! 🚀</p>

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "❌ TechFlow Deployment Failed - ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>💥 Deployment Failed!</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <p><strong>Message:</strong> ${{ github.event.head_commit.message }}</p>
            <p><strong>Workflow Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a></p>
            <hr>
            <p>Please check the logs and fix the deployment issue. 🔧</p>
